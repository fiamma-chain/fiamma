version: "3.2"

services:
  node-setup:
    image: ghcr.io/fiamma-chain/fiamma
    build:
      context: ../../
      dockerfile: ../../Dockerfile
    volumes:
      - ../testnet-nodes/${NODE_NAME}:/root/.fiamma:Z
      - ../setup_node.sh:/entrypoint.sh
    entrypoint: /entrypoint.sh ${NODE_NAME}

  node-runner:
    image: ghcr.io/fiamma-chain/fiamma
    build:
      dockerfile: ../../Dockerfile
    volumes:
      - ../testnet-nodes/${NODE_NAME}:/root/.fiamma:Z
    command: start
    depends_on:
      node-setup:
        condition: service_completed_successfully
